<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6B8A" />
  <title>콕콕 — 누군가 당신을 콕!</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Loading -->
    <div class="screen active" id="screen-loading">
      <div class="text-center">
        <div class="heart">💗</div>
        <p class="tagline">불러오는 중...</p>
      </div>
    </div>

    <!-- Not Matched -->
    <div class="screen" id="screen-not-matched">
      <div class="reveal-card">
        <div class="reveal-emoji">💌</div>
        <p class="reveal-message">누군가 당신을<br/>좋아하고 있어요</p>
        <div class="reveal-hint" id="reveal-hint" style="display:none;"></div>
      </div>
      <a href="index.html" class="btn-primary mt-32">나도 콕콕 해보기</a>
      <p class="caption text-center mt-16">상대방도 나를 콕콕하면,<br/>서로의 마음을 확인할 수 있어요.</p>
    </div>

    <!-- Matched -->
    <div class="screen" id="screen-matched">
      <div class="reveal-card">
        <div class="reveal-emoji">💗</div>
        <p class="reveal-message">서로 같은 마음이에요!</p>
        <div class="reveal-partner">
          <div class="name" id="partner-name"></div>
          <div class="phone" id="partner-phone"></div>
        </div>
      </div>
      <a href="index.html" class="btn-secondary mt-32">콕콕 더 해보기</a>
    </div>

    <!-- Error -->
    <div class="screen" id="screen-error">
      <div class="text-center">
        <div class="reveal-emoji">😢</div>
        <p class="reveal-message">페이지를 찾을 수 없어요</p>
      </div>
      <a href="index.html" class="btn-primary mt-32">콕콕 해보기</a>
    </div>

  </div>

  <script src="js/supabase-client.js"></script>
  <script src="js/reveal.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
