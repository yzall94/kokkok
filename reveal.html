<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06060F" />
  <title>콕콕 — 누군가 당신을 콕!</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="bg-particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="bg-noise"></div>

  <!-- SVG defs -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF5C8A" />
        <stop offset="100%" stop-color="#FF7A6E" />
      </linearGradient>
    </defs>
  </svg>

  <div class="app">

    <!-- Loading -->
    <div class="screen active" id="screen-loading">
      <svg class="heart-icon" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 28s-1.4-1.1-3.6-3C8.2 21.2 4 16.5 4 12.5 4 9.4 6.4 7 9.5 7c1.9 0 3.7 1 4.8 2.5h3.4C18.8 8 20.6 7 22.5 7 25.6 7 28 9.4 28 12.5c0 4-4.2 8.7-8.4 12.5C17.4 26.9 16 28 16 28z" fill="url(#heartGradient)"/>
      </svg>
      <p class="tagline">불러오는 중...</p>
    </div>

    <!-- Not Matched -->
    <div class="screen" id="screen-not-matched">
      <div class="reveal-card">
        <svg class="heart-icon" viewBox="0 0 32 32" style="margin-bottom:16px" aria-hidden="true">
          <path d="M16 28s-1.4-1.1-3.6-3C8.2 21.2 4 16.5 4 12.5 4 9.4 6.4 7 9.5 7c1.9 0 3.7 1 4.8 2.5h3.4C18.8 8 20.6 7 22.5 7 25.6 7 28 9.4 28 12.5c0 4-4.2 8.7-8.4 12.5C17.4 26.9 16 28 16 28z" fill="url(#heartGradient)"/>
        </svg>
        <p class="reveal-message">누군가 당신을<br/>좋아하고 있어요</p>
        <div class="reveal-hint" id="reveal-hint" style="display:none;"></div>
      </div>
      <a href="index.html" class="btn-primary mt-32">나도 콕콕 해보기</a>
      <p class="caption text-center mt-16">당신도 좋아하는 사람이 있다면,<br/>살짝 찔러보세요.</p>
    </div>

    <!-- Matched -->
    <div class="screen" id="screen-matched">
      <div class="reveal-card">
        <svg class="heart-icon" viewBox="0 0 32 32" style="margin-bottom:16px" aria-hidden="true">
          <path d="M16 28s-1.4-1.1-3.6-3C8.2 21.2 4 16.5 4 12.5 4 9.4 6.4 7 9.5 7c1.9 0 3.7 1 4.8 2.5h3.4C18.8 8 20.6 7 22.5 7 25.6 7 28 9.4 28 12.5c0 4-4.2 8.7-8.4 12.5C17.4 26.9 16 28 16 28z" fill="url(#heartGradient)"/>
        </svg>
        <p class="reveal-message">서로 같은<br/>마음이에요!</p>
        <div class="reveal-partner">
          <div class="name" id="partner-name"></div>
          <div class="phone" id="partner-phone"></div>
        </div>
      </div>
      <a href="index.html" class="btn-secondary mt-32">콕콕 더 해보기</a>
    </div>

    <!-- Error -->
    <div class="screen" id="screen-error">
      <p class="reveal-message" style="font-size:18px; color:var(--text-dim);">페이지를 찾을 수 없어요</p>
      <p class="caption mt-8">링크가 만료되었거나 잘못되었어요</p>
      <a href="index.html" class="btn-primary mt-32">콕콕 해보기</a>
    </div>

  </div>

  <script src="js/supabase-client.js"></script>
  <script src="js/reveal.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
