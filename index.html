<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05050E" />
  <title>콕콕 — 좋아하는 마음, 살짝 찔러보기</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="bg-particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="bg-noise"></div>

  <!-- SVG defs -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF5C8A" />
        <stop offset="100%" stop-color="#FF7A6E" />
      </linearGradient>
    </defs>
  </svg>

  <div class="app">

    <!-- Step 0: Splash -->
    <div class="step splash active" id="step-0">
      <div class="step-content">
        <div class="splash-orb-wrap" id="splash-orb" role="button" tabindex="0" aria-label="시작하기">
          <div class="splash-orb"></div>
        </div>
        <div class="title">콕콕</div>
        <p class="tagline">좋아하는 마음, 살짝 찔러보기</p>
        <p class="splash-hint">touch to start</p>
      </div>
    </div>

    <!-- Step 1: My Name -->
    <div class="step" id="step-1">
      <button class="btn-back" id="back-1" aria-label="뒤로">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="step-content">
        <h2 class="question stagger-1">당신의 이름은?</h2>
        <div class="input-group stagger-2">
          <input type="text" class="input-field" id="input-name"
                 placeholder="이름을 입력하세요" maxlength="20" autocomplete="off" />
        </div>
      </div>
      <button class="btn-primary step-btn stagger-3" id="btn-name-next" disabled>다음</button>
    </div>

    <!-- Step 2: Phone Verify -->
    <div class="step" id="step-2">
      <button class="btn-back" id="back-2" aria-label="뒤로">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="step-content">
        <h2 class="question stagger-1">전화번호를 알려주세요</h2>
        <div class="input-group stagger-2">
          <div class="verify-row">
            <input type="tel" class="input-field" id="input-phone"
                   placeholder="010-0000-0000" maxlength="13" autocomplete="off" />
            <button class="btn-inline" id="btn-send-code">인증번호 받기</button>
          </div>
          <div id="phone-status" class="status-msg"></div>
        </div>
        <div class="code-group stagger-3" id="code-group">
          <div class="input-group">
            <input type="tel" class="code-input" id="input-code"
                   placeholder="000000" maxlength="6" autocomplete="off" />
            <div id="code-status" class="status-msg"></div>
          </div>
        </div>
      </div>
      <button class="btn-primary step-btn stagger-4" id="btn-phone-next" disabled>다음</button>
    </div>

    <!-- Step 3: Target + Hint -->
    <div class="step" id="step-3">
      <button class="btn-back" id="back-3" aria-label="뒤로">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="step-content">
        <h2 class="question stagger-1">그 사람의 번호는?</h2>
        <div class="input-group stagger-2">
          <input type="tel" class="input-field" id="input-target"
                 placeholder="010-0000-0000" maxlength="13" autocomplete="off" />
        </div>
        <div class="input-group stagger-3">
          <label>힌트를 남길까요? (선택)</label>
          <textarea class="hint-field" id="input-hint"
                    placeholder="같은 반 안경 쓴 사람..."
                    maxlength="100"></textarea>
          <div class="char-counter"><span id="hint-count">0</span>/100</div>
        </div>
      </div>
      <button class="btn-primary step-btn stagger-4" id="btn-submit" disabled>콕!</button>
    </div>

    <!-- Step 4: Complete -->
    <div class="step" id="step-4">
      <div class="step-content">
        <svg class="heart-icon stagger-1" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 28s-1.4-1.1-3.6-3C8.2 21.2 4 16.5 4 12.5 4 9.4 6.4 7 9.5 7c1.9 0 3.7 1 4.8 2.5h3.4C18.8 8 20.6 7 22.5 7 25.6 7 28 9.4 28 12.5c0 4-4.2 8.7-8.4 12.5C17.4 26.9 16 28 16 28z" fill="url(#heartGradient)"/>
        </svg>
        <h2 class="question stagger-2">콕! 전달했어요</h2>
        <p class="subtitle stagger-3">상대방에게 메시지가 전달됐어요.<br/>서로 같은 마음이라면, 연결될 거예요.</p>
      </div>
      <button class="btn-secondary step-btn stagger-4" id="btn-reset">한 번 더 콕콕</button>
    </div>

  </div>

  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
